name: iOS Build and Test

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Setup Keychain
        run: |
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -l build.keychain

      - name: Create Provisioning Profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          # Créer un profil de provisioning vide
          echo "" > ~/Library/MobileDevice/Provisioning\ Profiles/empty.mobileprovision

      - name: Build and Test
        env:
          DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
        run: |
          xcodebuild clean test \
            -project EPCollaboratif.xcodeproj \
            -scheme EPCollaboratif \
            -destination 'platform=iOS Simulator,name=iPhone 14' \
            -resultBundlePath TestResults/TestResults.xcresult \
            -allowProvisioningUpdates \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            OTHER_CODE_SIGN_FLAGS="--keychain build.keychain"
        
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/TestResults.xcresult
          retention-days: 5
